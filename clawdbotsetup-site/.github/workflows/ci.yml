name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: clawdbotsetup-site/package-lock.json
      - name: Install
        working-directory: clawdbotsetup-site
        run: npm ci
      - name: Build
        working-directory: clawdbotsetup-site
        run: npm run build
